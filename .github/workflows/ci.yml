name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
    env:
      LEGAL_MATH_MODELING_ROOT: ${{ github.workspace }}/legal-math-modeling

    steps:
      - name: Checkout JC
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Checkout pinned specification
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: laubeing-droid/legal-math-modeling
          ref: a3a015941f75091c87d57aa956e712f1546dd7d4
          path: legal-math-modeling

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install locked core and test tooling
        run: |
          python -m pip install --require-hashes -r requirements/core.lock
          python -m pip install -r requirements/dev.lock

      - name: Supply-chain gate
        run: python tools/supply_chain_gate.py --requirements requirements/core.lock --output reports/supply-chain.json

      - name: Full tests
        run: python -m pytest tests/ -q

      - name: Real four-tool stdio gate
        run: python -m pytest tests/unit/test_mcp_stdio_protocol.py -q

      - name: Clean wheel build and outside install
        run: python tools/wheel_gate.py --out-dir dist --output reports/wheel-gate.json

      - name: Generate CycloneDX SBOM
        run: python -m pip_audit --requirement requirements/core.lock --format cyclonedx-json --output reports/sbom-core.cdx.json --progress-spinner off --strict --disable-pip

      - name: Generate build provenance
        shell: bash
        run: python tools/build_provenance.py --wheel "$(find dist -name '*.whl' -print -quit)" --output reports/build-provenance.json
        if: runner.os != 'Windows'

      - name: Generate build provenance on Windows
        shell: pwsh
        run: python tools/build_provenance.py --wheel (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName --output reports/build-provenance.json
        if: runner.os == 'Windows'

      - name: Upload verification evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: evidence-${{ matrix.os }}-py${{ matrix.python }}
          path: reports/
