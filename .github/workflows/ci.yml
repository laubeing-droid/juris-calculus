name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      LEGAL_MATH_MODELING_ROOT: ${{ github.workspace }}/legal-math-modeling

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout legal-math-modeling spec repo
        uses: actions/checkout@v4
        with:
          repository: laubeing-droid/legal-math-modeling
          path: legal-math-modeling

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest hypothesis pip-audit

      - name: Run supply-chain gate
        run: python tools/supply_chain_gate.py

      - name: Run real MCP stdio lifecycle gate
        run: python -m pytest tests/unit/test_mcp_stdio_protocol.py -q

      - name: Run full pytest suite
        run: python -m pytest tests/ -q

      - name: Run MCP manifest smoke
        run: python mcp_server.py --test

      - name: Lint primary rules YAML
        run: |
          python - <<'PY'
          import yaml
          with open("configs/zh_CN/rules.yaml", "r", encoding="utf-8") as fh:
              yaml.safe_load(fh)
          print("configs/zh_CN/rules.yaml OK")
          PY
