name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    env:
      LEGAL_MATH_MODELING_ROOT: ${{ github.workspace }}/legal-math-modeling
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Checkout legal-math-modeling spec repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: laubeing-droid/legal-math-modeling
          ref: a3a015941f75091c87d57aa956e712f1546dd7d4
          path: legal-math-modeling

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements/core.lock
          python -m pip install -r requirements/dev.lock

      - name: Run supply-chain gate
        run: python tools/supply_chain_gate.py --requirements requirements/core.lock

      - name: Run real MCP stdio lifecycle gate
        run: python -m pytest tests/unit/test_mcp_stdio_protocol.py -q

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run MCP manifest smoke
        run: python mcp_server.py --test

      - name: Lint rules.yaml
        run: python -c "import yaml; yaml.safe_load(open('configs/zh_CN/rules.yaml','r',encoding='utf-8')); print('rules.yaml OK')"

  release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          echo "## juris-calculus $(git describe --tags --abbrev=0)" > release_notes.md
          echo "" >> release_notes.md
          git log --oneline $(git describe --tags --abbrev=0 --always HEAD^)..HEAD >> release_notes.md
      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          body_path: release_notes.md
          generate_release_notes: true
