name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyyaml
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Lint rules.yaml
        run: python -c "import yaml; yaml.safe_load(open('configs/zh_CN/rules.yaml','r',encoding='utf-8')); print('rules.yaml OK')"
      - name: Generate changelog
        run: |
          echo "## juris-calculus $(git describe --tags --abbrev=0)" > release_notes.md
          echo "" >> release_notes.md
          git log --oneline $(git describe --tags --abbrev=0 --always HEAD^)..HEAD >> release_notes.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
