name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    env:
      LEGAL_MATH_MODELING_ROOT: ${{ github.workspace }}/legal-math-modeling
    steps:
      - uses: actions/checkout@v4

      - name: Checkout legal-math-modeling spec repo
        uses: actions/checkout@v4
        with:
          repository: laubeing-droid/legal-math-modeling
          path: legal-math-modeling

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest hypothesis pip-audit

      - name: Run supply-chain gate
        run: python tools/supply_chain_gate.py

      - name: Run real MCP stdio lifecycle gate
        run: python -m pytest tests/unit/test_mcp_stdio_protocol.py -q

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run MCP manifest smoke
        run: python mcp_server.py --test

      - name: Lint rules.yaml
        run: python -c "import yaml; yaml.safe_load(open('configs/zh_CN/rules.yaml','r',encoding='utf-8')); print('rules.yaml OK')"

  release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          echo "## juris-calculus $(git describe --tags --abbrev=0)" > release_notes.md
          echo "" >> release_notes.md
          git log --oneline $(git describe --tags --abbrev=0 --always HEAD^)..HEAD >> release_notes.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
