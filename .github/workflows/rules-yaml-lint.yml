name: Rules YAML Lint

on:
  push:
    paths:
      - 'configs/**/*.yaml'
      - 'configs/**/*.yml'
  pull_request:
    paths:
      - 'configs/**/*.yaml'
      - 'configs/**/*.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyyaml
      - name: Validate rules.yaml
        run: |
          python -c "
          import yaml, sys
          with open('configs/zh_CN/rules.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
          rules = data.get('rules', [])
          print(f'Total rules: {len(rules)}')
          # Check required fields
          for r in rules:
              assert 'id' in r, f'Missing id in rule'
              assert 'premise_atoms' in r, f'Missing premise_atoms in {r[\"id\"]}'
              assert 'head_claim' in r, f'Missing head_claim in {r[\"id\"]}'
              assert 'head_type' in r, f'Missing head_type in {r[\"id\"]}'
          print('All rules valid')
          # Check for circular dependencies in exception chains
          rule_map = {r['id']: r for r in rules}
          for r in rules:
              visited = set()
              exc = r.get('exception_chain', [])
              for e in exc:
                  if e not in rule_map:
                      print(f'WARN: {r[\"id\"]} references unknown exception {e}')
          print('Exception chain check complete')
          "
      - name: Tarjan SCC check
        run: |
          python -c "
          import yaml
          with open('configs/zh_CN/rules.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
          rules = data.get('rules', [])
          # Build dependency graph: rule -> [exception rules]
          graph = {}
          for r in rules:
              graph[r['id']] = r.get('exception_chain', [])
          # Simple cycle detection via DFS
          WHITE, GRAY, BLACK = 0, 1, 2
          color = {r['id']: WHITE for r in rules}
          def dfs(u, path):
              color[u] = GRAY
              for v in graph.get(u, []):
                  if v not in color:
                      continue
                  if color[v] == GRAY:
                      print(f'CYCLE DETECTED: {\" -> \".join(path + [v])}')
                      return True
                  if color[v] == WHITE:
                      if dfs(v, path + [v]):
                          return True
              color[u] = BLACK
              return False
          cycles = False
          for r in rules:
              if color[r['id']] == WHITE:
                  if dfs(r['id'], [r['id']]):
                      cycles = True
          if not cycles:
              print('No cycles detected in exception chains')
          "
