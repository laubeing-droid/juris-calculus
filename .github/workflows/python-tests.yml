name: Python Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest hypothesis
      - name: Unit tests
        run: python -m pytest tests/unit -q
      - name: Conflict smoke
        run: python -m pytest tests/test_conflict_case.py -q
      - name: Compile check
        run: python -m compileall -q compiler_core legalos_services pipeline mcp_server.py
      - name: P0-P2 guardrails
        run: |
          python tools/relevance_sensitivity_runner.py tests/relevance_sensitivity
          python tools/neural_contract_auditor.py
          python tools/rule_quality_auditor.py tests/relevance_sensitivity/contract_basics.yaml
      - name: Typed IR and LLM batch smoke
        run: |
          python tools/rule_to_ir_migrator.py --discover
          python tools/rule_to_ir_migrator.py configs/zh_CN/rules.yaml --jurisdiction zh_CN --limit 3 --allow-findings --out reports/typed_ir_smoke/zh_CN.ir.yaml --repair-requests-out reports/typed_ir_smoke/zh_CN_exception_repairs.jsonl
          python tools/rule_to_ir_migrator.py configs/hk/rules.yaml --jurisdiction hk --limit 3 --allow-findings --out reports/typed_ir_smoke/hk.ir.yaml
          python tools/rule_to_ir_migrator.py configs/en_US/US_Adapter.yaml --jurisdiction us --limit 3 --allow-findings --out reports/typed_ir_smoke/us_adapter.ir.yaml
          python tools/llm_batch_contract.py create CI_SMOKE --root reports/llm_batch_smoke --task rule_extraction --task source_span_alignment
      - name: Sprint 2-6 smoke
        run: |
          python tools/dacl_graph_runner.py tests/fixtures/rule_migration_sample.yaml
          python tools/relevance_dataset_builder.py validate tests/relevance_sensitivity
          python tools/semantic_compile_batch.py tests/fixtures/ci_requests.jsonl
          python tools/promotion_gate.py tests/fixtures/ci_promotion_candidate.json --source-anchor PASS --type-check PASS --relevance PASS --smt PASS --shadow PASS --neural-contract PASS --promotion-policy PASS
      - name: Phase matrix verification
        run: python tools/phase_runner.py --phase L6 --report-dir reports/phase_report_ci
