  - signature_id: "WI_ENF_001_Long_Arm_Statute"
    threat_level: "CRITICAL"
    pattern:
      - "Long-Arm Statute|Wis. Stat. § 801.05"
      - "personal jurisdiction"
      - "minimum contacts"
      - "purposeful availment"
      - "arising from|related to"
    action: "IMMEDIATE_PRC_CBL_FORCE_VOID"
    target_rule: "PEN_003_Long_Arm_Interdiction"
    description: "WI长臂管辖: 极低的minimum contacts门槛。'商业流'(stream of commerce)可将境内企业拉入WI法院。"

  # ── 行政裁决渗透 ──
