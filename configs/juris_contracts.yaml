contracts:
- contract_id: moe_domain_routing
  dynamic_parameters:
  - name: expert_shards
    source: configs/zh_CN/router_moe.yaml#/expert_shards
  - name: cross_rules
    source: configs/zh_CN/router_moe.yaml#/cross_rules
  - name: top_k_default
    source: configs/zh_CN/router_moe.yaml#/defaults/top_k
  failure_modes:
  - hardcoded_domain_shards
  - missing_criminal_expert
  - silent_tie_drop
  inputs:
  - fact_texts
  - configs/zh_CN/router_moe.yaml
  layer: L3
  must_hold:
  - expert names and keywords come from router_moe.yaml
  - tie at top_k boundary keeps all tied experts
  - criminal facts always include the criminal expert and criminal_complexity metadata
  outputs:
  - selected_experts
  - cross_expert_conflicts
  - criminal_complexity
  - trust_label
  pseudocode: "cfg = load_yaml(router_moe_path(\"zh_CN\"))\nscores = {}\nfor expert,\
    \ keywords in cfg.expert_shards:\n    scores[expert] = count keyword hits across\
    \ fact_texts\nranked = sort scores desc\nselected = keep top_k, preserving ties\
    \ at the boundary\nif is_criminal_case(raw_facts):\n    selected.add(\"刑事\")\n\
    \    criminal_complexity = classify_criminal_complexity(raw_facts)\ncross_conflicts\
    \ = any configured cross_rules where both experts are selected\nreturn selected,\
    \ cross_conflicts, criminal_complexity, ENGINEERING_BASELINE\n"
  purpose: Route legal facts to domain experts without hardcoding domain shards in
    Python.
  ref_code:
  - compiler_core/rule_router.py
  - compiler_core/config_paths.py
  ref_docs:
  - configs/zh_CN/router_moe.yaml
  - README_CN.md
  ref_tests:
  - tests/unit/test_criminal_complexity.py
- contract_id: criminal_multi_party_binding
  dynamic_parameters:
  - name: scenario_thresholds
    source: configs/zh_CN/criminal_complexity.yaml#/scenarios
  - name: binding_fields
    source: configs/zh_CN/criminal_complexity.yaml#/binding_fields
  - name: audit_policy
    source: configs/zh_CN/criminal_complexity.yaml#/audit_policy
  failure_modes:
  - compound_charge_split_into_false_multiple_charges
  - mixed_defendant_charge
  - penalty_without_actor
  inputs:
  - defendant
  - defendant_ls
  - accusation
  - defendant_accusation
  - defendant_judgement
  - relevant_article
  layer: L3-L5
  must_hold:
  - compound charges encoded as list items stay whole
  - S2/S3/S4 require actor-charge binding
  - unbound criminal conclusions downgrade rather than silently pass
  outputs:
  - scenario_id
  - route_tag
  - per_defendant_charges
  - binding_warnings
  pseudocode: "defendants = extract fields configured under binding_fields.defendants\n\
    charges = extract fields configured under binding_fields.charges\nif defendants\
    \ == 1 and charges == 1: scenario = S1\nelif defendants == 1 and charges > 1:\
    \ scenario = S2\nelif defendants > 1 and charges == 1: scenario = S3\nelif defendants\
    \ > 1 and charges > 1: scenario = S4\nif scenario in audit_policy.require_defendant_charge_binding_for:\n\
    \    require every legal claim to mention an actor and a charge\n    if relevant_law\
    \ exists, require claim to mention the law/article too\n    downgrade missing\
    \ binding to DOWNGRADE/UNVERIFIED\n"
  purpose: Distill MultiJustice-MPMCP into routing, adversarial audit, and actor-charge-law
    binding verification.
  ref_code:
  - compiler_core/criminal_complexity.py
  - compiler_core/rule_router.py
  - pipeline/adversarial_pipeline.py
  - compiler_core/step_verifier.py
  ref_docs:
  - configs/zh_CN/criminal_complexity.yaml
  ref_tests:
  - tests/unit/test_criminal_complexity.py
- contract_id: phase_verification_harness
  dynamic_parameters:
  - name: phase_commands
    source: configs/juris_phase_matrix.yaml#/phases/*/commands
  - name: replay_policy
    source: configs/juris_phase_matrix.yaml#/replay_policy
  - name: closure_policy
    source: configs/juris_phase_matrix.yaml#/closure_policy
  failure_modes:
  - fake_pass_report
  - missing_phase_command
  - contract_change_without_matrix_update
  inputs:
  - configs/juris_phase_matrix.yaml
  layer: L0-L6
  must_hold:
  - only verification commands can declare PASS
  - every command records returncode/stdout/stderr/pid
  - replay can rerun at least one successful command from a report
  - bug fixes update code, tests, and contracts when behavior changes
  outputs:
  - reports/phase_report/*.json
  pseudocode: "audit matrix before running commands\nfor each selected phase:\n  \
    \  run each configured command as a subprocess\n    record pid, returncode, stdout,\
    \ stderr, duration\n    stop at first failed command\nwrite verification report\n\
    replay selects one successful command from report and reruns it\n"
  purpose: Make implementation subject to phase gates, PID evidence, replay, and closure
    policy.
  ref_code:
  - tools/blueprint_contract_auditor.py
  - tools/phase_runner.py
  - tools/verification_replay.py
  ref_docs:
  - configs/juris_phase_matrix.yaml
  ref_tests:
  - tests/unit/test_phase_harness.py
- contract_id: knowledge_graph_dual_audit
  dynamic_parameters:
  - name: contract_graph
    source: configs/juris_contracts.yaml#/contracts
  - name: phase_graph
    source: configs/juris_phase_matrix.yaml#/phases
  - name: audit_mode
    source: tools/kg_audit_loop.py#--mode
  failure_modes:
  - ungrounded_contract_claim
  - missing_reference_chain
  - missing_pseudocode
  - defect_without_root_cause_node
  - implementation_fix_without_blueprint_repair
  inputs:
  - configs/juris_contracts.yaml
  - configs/juris_phase_matrix.yaml
  - configs/zh_CN/*.yaml
  layer: L0
  must_hold:
  - correctness audit verifies that referenced knowledge claims are grounded in existing
    docs/code/tests
  - completeness audit verifies that each contract contains purpose, failure modes,
    dynamic parameters, pseudocode, and three-level references
  - defects are attributed to contract_id and field path before any repair is accepted
  - repair suggestions update contracts or phase matrix before implementation claims
    PASS
  outputs:
  - reports/kg_audit/*.json
  - root_cause_nodes
  - blueprint_patch_suggestions
  pseudocode: 'spawn correctness auditor with isolated process when claude cli is
    available

    spawn completeness auditor with isolated process when claude cli is available

    otherwise run deterministic local auditors with separate subprocess PIDs

    merge audit findings by contract_id and field_path

    require every finding to name a root_cause_node

    generate blueprint_patch_suggestions for contracts or phase matrix

    rerun both audits until status is PASS or max_iterations is reached

    '
  purpose: Audit structured legal knowledge as a graph with complementary correctness
    and completeness reviewers.
  ref_code:
  - tools/kg_correctness_auditor.py
  - tools/kg_completeness_auditor.py
  - tools/kg_audit_loop.py
  ref_docs:
  - configs/juris_contracts.yaml
  - configs/juris_phase_matrix.yaml
  ref_tests:
  - tests/unit/test_kg_audit.py
- contract_id: physically_isolated_agent_collaboration
  dynamic_parameters:
  - name: role_boundaries
    source: configs/agent_collaboration_protocol.yaml#/roles
  - name: controller_rules
    source: configs/agent_collaboration_protocol.yaml#/controller_rules
  - name: release_evidence
    source: configs/agent_collaboration_protocol.yaml#/release_evidence
  failure_modes:
  - implementer_self_certifies
  - quality_review_before_spec_review
  - reviewer_trusts_report_without_code
  - release_without_human_evidence
  inputs:
  - configs/agent_collaboration_protocol.yaml
  - configs/juris_phase_matrix.yaml
  layer: L0-L6
  must_hold:
  - implementer reports DONE/DONE_WITH_CONCERNS/NEEDS_CONTEXT/BLOCKED and cannot declare
    PASS
  - spec compliance review must pass before code quality review starts
  - reviewers read actual code or diff and do not trust implementer report
  - public release requires human review evidence and model/harness disclosure
  outputs:
  - role_boundaries
  - review_sequence
  - release_evidence_requirements
  pseudocode: 'controller gives implementer complete task text and relevant context

    implementer writes code, self-reviews, and reports one explicit status

    if status is BLOCKED or NEEDS_CONTEXT, controller changes context/model/task split

    spec_compliance_reviewer independently reads actual diff and contract

    if spec review fails, implementer fixes and spec reviewer reruns

    code_quality_reviewer starts only after spec compliance PASS

    verification runs phase commands and replay

    public release requires human review evidence and model/harness disclosure

    '
  purpose: Adapt Superpowers-style subagent-driven development into legal inference
    engineering gates.
  ref_code:
  - tools/agent_protocol_auditor.py
  - tools/phase_runner.py
  - tools/kg_audit_loop.py
  ref_docs:
  - configs/agent_collaboration_protocol.yaml
  - https://github.com/obra/superpowers/tree/main/skills/subagent-driven-development
  ref_tests:
  - tests/unit/test_agent_protocol.py
name: juris-calculus structured experience contracts
principles:
- contract_first
- three_level_reference_chain
- self_contained_pseudocode
- dynamic_parameters_from_physical_config
version: 2.0.0
