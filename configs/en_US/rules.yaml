# juris-calculus US Common Law Rules — UCC Article 2 Contract Disputes
# Loaded by tests/run_benchmark.py and FixpointEvaluator via load_rules_from_yaml()

rules:
  - id: R_ContractFormed
    premise_atoms: [ContractFormed]
    head_claim: ContractExists
    concepts: [Contract, Offer, Acceptance, Consideration]
    exception_chain: []
    head_type: HORN
    mechanical_exception: true

  - id: R_PerformanceDue
    premise_atoms: [ContractExists, GoodsDelivered]
    head_claim: PerformanceObligationActive
    concepts: [Contract, Delivery]
    exception_chain: []
    head_type: HORN
    mechanical_exception: true

  - id: R_PaymentObligation
    premise_atoms: [PerformanceObligationActive, PaymentDue]
    head_claim: PaymentObligationTriggered
    concepts: [Payment]
    exception_chain: []
    head_type: HORN
    mechanical_exception: true

  - id: R_BreachByNonpayment
    premise_atoms: [PaymentObligationTriggered, BreachAlleged]
    head_claim: BreachEstablished
    concepts: [Breach, Payment]
    exception_chain: [R_ForceMajeure, R_Impossibility]
    head_type: HORN
    mechanical_exception: true

  - id: R_ForceMajeure
    premise_atoms: [ActOfGod, CausalLink]
    head_claim: PerformanceExcused
    concepts: [ForceMajeure]
    exception_chain: []
    head_type: HORN
    mechanical_exception: false

  - id: R_Impossibility
    premise_atoms: [ImpossibilityClaimed, NoAlternativePerformance]
    head_claim: PerformanceExcused
    concepts: [Impossibility]
    exception_chain: []
    head_type: NON_HORN
    mechanical_exception: false

  - id: R_DamagesOwed
    premise_atoms: [BreachEstablished, DamagesClaimed]
    head_claim: DamagesCalculable
    concepts: [Damages, Breach]
    exception_chain: []
    head_type: HORN
    mechanical_exception: true

  - id: R_RemediesAvailable
    premise_atoms: [DamagesCalculable]
    head_claim: RemediesOrdered
    concepts: [Damages, Remedies]
    exception_chain: []
    head_type: HORN
    mechanical_exception: true
