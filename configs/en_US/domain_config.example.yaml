# juris-calculus: US Common Law domain configuration (demo)
# Copy this file to ignite_config.yaml and fill in your calibrated parameters.

jurisdiction: "en_US"
core_alpha: 1.0           # DEMO placeholder. US firms must run calibrate_theilsen() with their billing records.

# Under US Common Law, billable hours are significantly higher due to:
# - Discovery phase (document review, depositions)
# - Multi-state litigation overhead
# - Partner/Senior Associate tiered billing matrix

taint_threshold: 0.0
hard_audit: 0.0
critical_score: 0.3
streak_limit: 3

factors:
  b_location: 1.5         # Cross-state litigation (e.g., SDNY Federal Court)
  gamma_stage: 1.8        # Discovery & Deposition phase complexity
  t_overhead: 16.0        # Cross-state travel overhead (hours)

# Billable Hours Tier vector (H)
# US White-Shoe firms should calibrate these weights against their own billing matrix.
leverage_vector_h:
  Partner: 1.8
  Senior_Associate: 1.3
  Associate: 1.0
  Paralegal: 0.5

# ############################################################
# pricing: attorney fee pricing parameters (migrated from peripheral_models.py hardcodes)
# ############################################################
pricing:
  # --- Rate parameters ---
  default_rate: 2000.0         # Default hourly rate (CNY/hr). US firms should calibrate to local billing matrix.
                               # 默认小时费率（元/小时），美国律所应按当地收费标准校准
  base_fee: 2.0                # Minimum billing multiplier. Each case billed at least base_fee * D (estimated workdays).
                               # 最低收费倍数，每案至少收 base_fee × D（预计工作日）倍基准费
  taint_hour_default: 0.2      # Light-taint hour coefficient (TAINTED level: fact extraction uncertain but inferable)
                               # 轻度污染工时系数（TAINTED 级别：事实提取有疑问但可推理）
  hard_hour_default: 1.5       # Heavy-taint hour coefficient (HARD level: extensive manual review required)
                               # 重度污染工时系数（HARD 级别：大量手工复核）
  # --- Pricing slope safety clamps (prevent extreme case pricing distortion) ---
  slope_clip_min: 0.01         # Slope floor. Below this = "case type unpricable". Force clamp.
                               # 斜率下限，低于此值视为"案件类型无法定价"，强制 clamp
  slope_clip_max: 10.0         # Slope ceiling. Above this = "extreme complexity". Force clamp.
                               # 斜率上限，高于此值视为"极端复杂案件"，强制 clamp
  # --- Complexity coefficient ---
  alpha_clamp_min: 0.05        # Minimum complexity coefficient. Simplest cases >= 0.05x base fee.
                               # 最低复杂度系数，最简案子不低于 0.05 倍基准费
  alpha_clamp_max: 2.0         # Maximum complexity coefficient. Most complex cases <= 2.0x base fee.
                               # 最高复杂度系数，最复案子不高于 2.0 倍基准费

# ############################################################
# semantic: semantic matching parameters (migrated from semantic_fact_matcher.py hardcodes)
# ############################################################
semantic:
  default_threshold: 0.65      # Fact-statute semantic match similarity threshold. Below this = "not relevant".
                               # 事实-法条语义匹配相似度阈值，低于此值判"不相关"
                               # Criminal cases: raise to 0.80. Civil contract disputes: lower to 0.50.
                               # 刑法案由建议调高至 0.80，民事合同纠纷可放宽至 0.50
  threshold_range: [0.20, 0.50]  # Auto-calibration probe range for NLNI-02 neural node
                                 # 阈值自动校准的探查范围（NLNI-02 神经节点用）
