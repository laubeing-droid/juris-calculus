# juris-calculus: US Common Law domain configuration (demo)
# Copy this file to ignite_config.yaml and fill in your calibrated parameters.

jurisdiction: "en_US"
core_alpha: 1.0           # DEMO placeholder. US firms must run calibrate_theilsen() with their billing records.

# Under US Common Law, billable hours are significantly higher due to:
# - Discovery phase (document review, depositions)
# - Multi-state litigation overhead
# - Partner/Senior Associate tiered billing matrix

taint_threshold: 0.0
hard_audit: 0.0
critical_score: 0.3
streak_limit: 3

factors:
  b_location: 1.5         # Cross-state litigation (e.g., SDNY Federal Court)
  gamma_stage: 1.8        # Discovery & Deposition phase complexity
  t_overhead: 16.0        # Cross-state travel overhead (hours)

# Billable Hours Tier vector (H)
# US White-Shoe firms should calibrate these weights against their own billing matrix.
leverage_vector_h:
  Partner: 1.8
  Senior_Associate: 1.3
  Associate: 1.0
  Paralegal: 0.5
