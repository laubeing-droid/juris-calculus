jurisdiction: US
family: Common_Law
description: 美国联邦法对 L0 原语的覆写。US 普通法继承了英国普通法的核心特征（对价、禁反言），但增加了宪法层面的权利保护（Due Process, Double Jeopardy）和破产法的特殊状态机（Automatic Stay,
  Discharge）。
overrides:
  Act:
    legal_intent:
      value: Optional
      reason: 普通法承认严格责任——特定行为（如危险品运输）无意图也可构成 Act
  Agent:
    capacity_required:
      value: Conditional
      reason: 美国法：未成年人可签订必需品合同；公司代理人需授权但表见代理可越权
  Status:
    valid_transitions:
      value:
      - Established→Valid
      - Valid→Void
      - Valid→Voidable
      - Valid→Terminated
      - Valid→PENDING
      - PENDING→Valid
      - CONDITIONAL→Valid
      - VALID→SUPPRESSED
      - SUPPRESSED→VALID
      - Valid→Breached
      - Breached→Remedied
      - VOIDABLE→VOID
      - VOIDABLE→VALID
      reason: 美国法状态机：增加 SUPPRESSED 状态（破产自动中止）、VOIDABLE 双向转换（可追认/可确认无效）
  Defect:
    additional_defects:
      value:
      - Consideration_Failure
      - Promissory_Estoppel_Bar
      - Due_Process_Violation
      - Double_Jeopardy_Attached
      - Fraud_on_the_Court
      - Automatic_Stay_Violation
      - Wrongful_Omission
      reason: 美国法特有缺陷：宪法保护 + 破产法 + 检察视角
  Power:
    Consideration:
      value: Required
      reason: 美国普通法继承英国对价原则——无对价无合同（promissory estoppel 为例外）
    Automatic_Stay_Suppression:
      value: Enabled
      reason: Chapter 11/13 自动中止——债权人 Power(Collect) 被全局抑制
    Director_Power:
      value: Subject_to_Bankruptcy_Override
      reason: 美国法下：进入 Chapter 11 后，DIP 或 Trustee 接管董事经营权力
