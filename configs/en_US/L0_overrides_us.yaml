  trigger_fact: Bankruptcy_Petition_Filed
  action: suppress_power
  target: Creditor_Collect
  effect: Power(Collect)=0 → 所有催收行为中止
  irreversible: false
  reason: 11 U.S.C. §362 — Automatic Stay
