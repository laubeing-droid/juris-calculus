# ═══════════════════════════════════════════════════════════
# State-Level Topological Router — US 50-State Coverage
# ═══════════════════════════════════════════════════════════
# 策略: 二八定律——将51州(含DC)按跨境对抗拓扑聚类为4大标准模型
#       不再为每个州单独建轨，通过语义路由统一收敛
# ============================================================
# 四大骨干模型 (Backbone Models):
#   1. DE_CORPORATE:  公司治理/离岸穿透 (DE/MA/SD/WY...)
#   2. LONG_ARM:      激进长臂管辖 (TX/FL/IL/OH...)
#   3. CFA_PUNITIVE:  反欺诈/惩罚性赔偿 (CA/NY/PA/WA...)
#   4. DEFAULT_UCC:   默认UCC/普通法 (其余长尾州)
# ═══════════════════════════════════════════════════════════

metadata:
  version: v1.2.0-complete
  strategy: Topological-Clustering
  total_states: 51
  models: 4
  verified_states: [WI, NJ]
  description: >
    威斯康辛(WI)验证了LONG_ARM模型的Horn骨架,
    新泽西(NJ)验证了CFA_PUNITIVE模型的Horn骨架。
    其余48州通过关键字+法典特征签名自动路由至四大骨干。

# ═══════════════════════════════════════════
# 路由表: 州 → 骨干模型 + 特征签名 + 目标轨道
# ═══════════════════════════════════════════

routing_table:
  # ── 模型1: 特拉华公司治理模型 (Cap 622 + SPC 横向否认) ──
  DE_CORPORATE:
    target_backbone: "US_STANDARD_CORPORATE_PENETRATION"
    primary_engine: "us_core_corporate"  # US Adapter Cap 622 counterpart
    cross_rail_hk: "HK_CAP622_Shadow_Director + HK_CAP622_UltraVires"
    cross_rail_prc: "CN_SPEC_001_Horizontal_Piercing + SPC_001"
    states:
      - DE   # 特拉华: 全球最发达公司判例法
      - MA   # 马萨诸塞: 波士顿商法
      - SD   # 南达科他: 信托避税天堂
      - WY   # 怀俄明: LLC法
      - CT   # 康涅狄格
      - NH   # 新罕布什尔
      - VT   # 佛蒙特
      - RI   # 罗德岛
      - ME   # 缅因
      - ID   # 爱达荷
    keyword_signatures:
      - "derivative action|shareholder suit"
      - "piercing the corporate veil|alter ego"
      - "fiduciary duty|duty of loyalty|duty of care"
      - "business judgment rule|entire fairness"
      - "inspection of books|books and records"
      - "dissolution|judicial dissolution"
      - "oppression remedy|unfair prejudice"
      - "indemnification|advancement"
    horn_atoms:
      - "Power(Corporate_Governance) → Status(Jurisdiction_Active)"
      - "Defect(Fiduciary_Breach) → Status(VOIDABLE)"
      - "Agent(Shadow_Director) → Defect(Liability_Chain)"
    description: "特拉华衡平法院判例法体系→路由至HK Cap 622影子董事+越权+SPC横向人格否认三轨并发"

  # ── 模型2: 激进长臂管辖模型 (已WI验证) ──
  LONG_ARM:
    target_backbone: "US_STANDARD_AGGRESSIVE_LONG_ARM"
    primary_engine: "us_core_long_arm"  # WI_Stat_801_LongArm verified
    cross_rail_hk: "HK_CAP4A_Anti_Suit_Injunction + HK_CAP4A_Mareva"
    cross_rail_prc: "PEN_003_Long_Arm_Interdiction + CN_SPEC_006_DataExport"
    states:
      - TX   # 德克萨斯: 最激进长臂
      - FL   # 佛罗里达
      - IL   # 伊利诺伊: BIPA生物识别长臂
      - OH   # 俄亥俄
      - GA   # 乔治亚
      - NC   # 北卡
      - SC   # 南卡
      - TN   # 田纳西
      - AL   # 阿拉巴马
      - MS   # 密西西比
      - LA   # 路易斯安那(混合法系)
      - AR   # 阿肯色
      - OK   # 俄克拉荷马
      - IN   # 印第安纳
      - KY   # 肯塔基
      - MO   # 密苏里
      - IA   # 爱荷华
    keyword_signatures:
      - "long arm|long-arm|minimum contacts|purposeful availment"
      - "doing business|transacting business|business transaction"
      - "tortious act|tortfeasor|tortious conduct"
      - "biometric|BIPA|privacy act"
      - "consumer fraud|deceptive trade|unfair business"
      - "personal jurisdiction|general jurisdiction|specific jurisdiction"
      - "forum non conveniens|venue"
    horn_atoms:
      - "Act(Business_Contact) → Status(Jurisdiction_Active=Long_Arm)"
      - "Status(Long_Arm_Active) → Power(Foreign_Defendant_Subject_To_Suit)"
      - "Defect(Privacy_Violation) → Asset(Statutory_Damages_Per_Incident)"
    description: "TX/IL激进长臂→路由至WI验证桩→触发PRC长臂阻断+数据出境一票否决"

  # ── 模型3: 反欺诈/惩罚性赔偿绞肉机 (已NJ验证) ──
  CFA_PUNITIVE:
    target_backbone: "US_STANDARD_CFA_PUNITIVE"
    primary_engine: "us_core_cfa"  # NJ_CFA_Standard verified
    cross_rail_hk: "HK_CAP571_False_Trading + HK_CAP32_Fraudulent_Trading"
    cross_rail_prc: "BLK_021_Discovery_Fishing + PEN_005_Crypto_Prohibition"
    states:
      - CA   # 加州: B&P 17200 + 消费者法
      - NY   # 纽约: GBL 349 + 强力检察
      - PA   # 宾夕法尼亚
      - WA   # 华盛顿州
      - OR   # 俄勒冈
      - CO   # 科罗拉多
      - MN   # 明尼苏达
      - AZ   # 亚利桑那
      - NV   # 内华达
      - NM   # 新墨西哥
      - UT   # 犹他
      - MT   # 蒙大拿
    keyword_signatures:
      - "consumer fraud|consumer protection|unfair competition"
      - "punitive damages|exemplary damages|treble damages"
      - "temporary restraining order|preliminary injunction"
      - "false advertising|misleading advertising|deceptive act"
      - "whistleblower|qui tam|false claims"
      - "civil penalty|statutory penalty|per violation"
      - "attorney general enforcement|AG enforcement"
    horn_atoms:
      - "Act(Consumer_Deceptive_Conduct) → Status(CFA_Violation_Established)"
      - "Status(CFA_Violation) → Asset(Punitive_Damages_Up_To_Treble)"
      - "Power(AG_Enforcement) → Act(Industry_Wide_Injunction)"
    description: "CA/NY消费者保护绞肉机→路由至NJ CFA验证桩→触发PRC惩罚性赔偿阻断"

  # ── 模型4: 默认UCC/重述法边缘州 ──
  DEFAULT_UCC:
    target_backbone: "US_STANDARD_DEFAULT_UCC"
    primary_engine: "us_core_default"  # 81条联邦/通用算子直接接管
    cross_rail_hk: "NONE"  # 无需特殊映射
    cross_rail_prc: "NONE"  # 仅通用CBL触发
    states:
      - AK   # 阿拉斯加
      - HI   # 夏威夷
      - KS   # 堪萨斯
      - NE   # 内布拉斯加
      - ND   # 北达科他
      - WV   # 西弗吉尼亚
      - DC   # 哥伦比亚特区
    keyword_signatures:
      - "UCC|uniform commercial code"
      - "restatement|restatements"
      - "model act|uniform act"
      - "Negotiable Instruments|Bank Deposits"
      - "Secured Transactions|Sales"
    horn_atoms:
      - "Status(UCC_Default) → Status(Horn_Convergence_Silent)"
    description: "默认UCC/重述法依赖州→81条US联邦/通用Horn规则静默收敛"

# ═══════════════════════════════════════════
# 路由引擎: 输入任意州级fact → 输出标准骨干标签
# ═══════════════════════════════════════════

router_engine:
  version: "1.0.0"
  input: "state_fact_string OR state_code"
  output: "standard_backbone_label + trigger_atoms"
  
  state_to_backbone:
    DE: "DE_CORPORATE"
    MA: "DE_CORPORATE"
    SD: "DE_CORPORATE"
    WY: "DE_CORPORATE"
    CT: "DE_CORPORATE"
    NH: "DE_CORPORATE"
    VT: "DE_CORPORATE"
    RI: "DE_CORPORATE"
    ME: "DE_CORPORATE"
    ID: "DE_CORPORATE"
    TX: "LONG_ARM"
    FL: "LONG_ARM"
    IL: "LONG_ARM"
    OH: "LONG_ARM"
    GA: "LONG_ARM"
    NC: "LONG_ARM"
    SC: "LONG_ARM"
    TN: "LONG_ARM"
    AL: "LONG_ARM"
    MS: "LONG_ARM"
    LA: "LONG_ARM"
    AR: "LONG_ARM"
    OK: "LONG_ARM"
    IN: "LONG_ARM"
    KY: "LONG_ARM"
    MO: "LONG_ARM"
    IA: "LONG_ARM"
    CA: "CFA_PUNITIVE"
    NY: "CFA_PUNITIVE"
    PA: "CFA_PUNITIVE"
    WA: "CFA_PUNITIVE"
    OR: "CFA_PUNITIVE"
    CO: "CFA_PUNITIVE"
    MN: "CFA_PUNITIVE"
    AZ: "CFA_PUNITIVE"
    NV: "CFA_PUNITIVE"
    NM: "CFA_PUNITIVE"
    UT: "CFA_PUNITIVE"
    MT: "CFA_PUNITIVE"
    AK: "DEFAULT_UCC"
    HI: "DEFAULT_UCC"
    KS: "DEFAULT_UCC"
    NE: "DEFAULT_UCC"
    ND: "DEFAULT_UCC"
    WV: "DEFAULT_UCC"
    DC: "DEFAULT_UCC"

  fact_pattern_to_backbone:
    # 关键词 → 骨干模型映射
    - pattern: "derivative action|shareholder suit|piercing|fiduciary|business judgment|indemnification"
      backbone: "DE_CORPORATE"
      trigger_facts:
        - "US_STANDARD_CORPORATE_PENETRATION"
        - "Director_Duty_Breach_Potential"
    - pattern: "long arm|minimum contacts|doing business|personal jurisdiction|tortious act"
      backbone: "LONG_ARM"
      trigger_facts:
        - "US_STANDARD_AGGRESSIVE_LONG_ARM"
        - "US_Long_Arm_Jurisdiction_Asserted"
    - pattern: "consumer fraud|punitive damages|treble damages|deceptive|unfair competition|whistleblower"
      backbone: "CFA_PUNITIVE"
      trigger_facts:
        - "US_STANDARD_CFA_PUNITIVE"
        - "US_Punitive_Damages_Potential"
    - pattern: "UCC|uniform commercial|restatement|model act"
      backbone: "DEFAULT_UCC"
      trigger_facts:
        - "US_STANDARD_DEFAULT_UCC"
