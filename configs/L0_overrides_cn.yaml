# L0 覆写 — 中国法（大陆法）
jurisdiction: CN
family: Civil_Law
description: 中国大陆民法对 L0 原语属性的覆写

overrides:
  Act:
    legal_intent:
      value: Required
      reason: "大陆法系法律行为必须有意思表示——无意图不构成法律行为"

  Agent:
    capacity_required:
      value: Required
      reason: "民法典第144条——无民事行为能力人实施的民事法律行为无效"

  Status:
    valid_transitions:
      value:
        - "Established->Valid"
        - "Valid->Void"
        - "Valid->Voidable"
        - "Valid->Terminated"
      reason: "大陆法救济以赔偿为主，无违约后补救的普通法概念"

  Asset:
    transferability:
      value: Conditional
      reason: "民法典第153条——违反强制性规定的交易标的不具可转让性"

  Power:
    Consideration:
      value: Disabled
      reason: "大陆法无对价概念——合同成立仅需要约+承诺"
