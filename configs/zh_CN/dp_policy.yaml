policies:
  - data_class: state_secret
    epsilon_range: [0.0, 0.0]
    allowed_release_mode: blocked
    approval_required: true
    audit_log_required: true
    source_id: "PRC_State_Secret_Law_Art3"
  - data_class: trade_secret
    epsilon_range: [0.1, 1.0]
    allowed_release_mode: anonymized
    approval_required: true
    audit_log_required: true
    source_id: "PRC_Unfair_Competition_Law_Art9"
  - data_class: personal_info
    epsilon_range: [0.5, 2.0]
    allowed_release_mode: aggregated
    approval_required: false
    audit_log_required: true
    source_id: "PRC_PIPL_Art28"
  - data_class: public_record
    epsilon_range: [1.0, 1000.0]
    allowed_release_mode: full
    approval_required: false
    audit_log_required: false
    source_id: "public"
