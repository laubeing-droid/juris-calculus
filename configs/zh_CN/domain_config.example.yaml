# juris-calculus: Chinese Civil Law domain configuration (calibrated)
# 基于 92 案中国案卷点火的实测校准值
# 使用：cp 到 ignite_config.yaml 或直接引用

jurisdiction: "zh_CN"

# ── 精算常数 ──
alpha_calibrated: 1.0         # 覆盖缺省值 1.0
taint_threshold: 0.45        # 污点阈值（调低→更多规则进入审计链，解决 T2=0%）
hard_audit_threshold: 0.25   # 强制人工复核阈值
critical_score_threshold: 0.35  # CRITICAL_CLARITY_FAILURE 触发阈值（调高→更早诚实拒算）
critical_streak_max: 3       # 连续低分熔断上限
k_max: 4                     # 例外链最大深度（中国法例外链更深）

# ── 推理权重（四维：深度/Horn类型/概念覆盖率/机械例外）──
weights: [0.25, 0.15, 0.35, 0.25]
# 相比默认 (0.2,0.2,0.4,0.2) 的调整：
# - 深度惩罚 ↑ (0.20→0.25) ：中国法例外链更深
# - Horn类型 ↓ (0.20→0.15) ：中国法裁量性规则更多
# - 概念覆盖率 ↓ (0.40→0.35)：概念注册表尚待补完
# - 机械例外 ↑ (0.20→0.25) ：中国法客观标准更多

# ── 空间与审级因子 ──
factors:
  b_location: 1.3            # 跨省胜诉旅行溢价
  gamma_stage: 1.25          # 二审/再审复杂度修正
  t_overhead: 8.0            # 省外往返固定行程损耗（小时）

# ── 概念注册表 ──
# 由 convert_to_juris_rules.py 自动从规则集生成
# 完整列表见 concept_registry.yaml

# ============================================================
# pricing: migrated hardcoded params from peripheral_models.py
# ============================================================
pricing:
  slope_clip_min: 0.01
  slope_clip_max: 10.0
  alpha_clamp_min: 0.05
  alpha_clamp_max: 2.0
  default_rate: 2000.0
  base_fee: 2.0

# ============================================================
# semantic: migrated hardcoded params from semantic_fact_matcher
# ============================================================
semantic:
  default_threshold: 0.65
  threshold_range: [0.20, 0.50]

# ############################################################
# pricing: 律师费定价参数（从 peripheral_models.py 硬编码迁移至 YAML）
# ############################################################
pricing:
  # --- 费率参数 ---
  default_rate: 2000.0         # 默认小时费率（元/小时），各地律师协会收费标准不同，福建漳州约2000，北京上海约3000-5000
  base_fee: 2.0                # 最低收费倍数，每案至少收 base_fee × D（预计工作日）倍基准费
  taint_hour_default: 0.2      # 轻度污染工时系数（TAINTED 级别：事实提取有疑问但可推理）
  hard_hour_default: 1.5       # 重度污染工时系数（HARD 级别：大量手工复核）
  # --- 定价斜率安全阀（防止极端案件定价失真） ---
  slope_clip_min: 0.01         # 斜率下限，低于此值视为"案件类型无法定价"，强制 clamp
  slope_clip_max: 10.0         # 斜率上限，高于此值视为"极端复杂案件"，强制 clamp
  # --- 复杂度系数 ---
  alpha_clamp_min: 0.05        # 最低复杂度系数，最简案子不低于 0.05 倍基准费
  alpha_clamp_max: 2.0         # 最高复杂度系数，最复案子不高于 2.0 倍基准费

# ############################################################
# semantic: 语义匹配参数（从 semantic_fact_matcher.py 硬编码迁移至 YAML）
# ############################################################
semantic:
  default_threshold: 0.65      # 事实-法条语义匹配相似度阈值，低于此值判"不相关"
                               # 刑法案由建议调高至 0.80，民事合同纠纷可放宽至 0.50
  threshold_range: [0.20, 0.50]  # 阈值自动校准的探查范围（NLNI-02 神经节点用）
