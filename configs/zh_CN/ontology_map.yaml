# juris-calculus 多租户本体映射表 v4.0
# 覆盖 13 大门类 + 30+ 子领域
# 每个域独立：registry_path + 原子前缀 + regex 触发器 + 概念白名单

version: "4.0.0"
schema: "multi_namespace_isolated"
total_domains: 13
total_atoms: 140

# ═══════════════════════════════════════════
# 1. 刑事（2册，最高频207次）
# ═══════════════════════════════════════════
criminal:
  domain_id: "CRIMINAL"
  registry_path: "domains.criminal"
  # 刑事案件特有高频排他性法律术语（强特征）
  regex_triggers: 
    - "刑事判决书"
    - "公诉机关"
    - "检察院"
    - "犯有"
    - "触犯"
    - "刑法"
    - "有期徒刑"
    - "拘役"
    - "故意伤害"
    - "盗窃"
    - "抢劫"
    - "诈骗"
    - "强奸"
    - "毒品"
    - "贪污"
    - "受贿"
    - "非法经营"
    - "故意杀人"
    - "绑架"
    - "敲诈勒索"
    - "寻衅滋事"
    - "交通肇事"
    - "危险驾驶"
    - "非法吸收"
    - "集资诈骗"
    - "职务侵占"
    - "挪用资金"
    - "挪用公款"
    - "刑讯逼供"
    - "徇私枉法"
    - "渎职"
    - "玩忽职守"
    - "滥用职权"
    - "犯罪"
    - "刑事"
    - "罪名"
    - "量刑"
    - "羁押"
    - "逮捕"
    - "侦查"
    - "提起公诉"

  fact_atoms:
    # 客观要件 (Actus Reus)
    "致人重伤": "Crim.Objective.SEVERE_INJURY"
    "致人死亡": "Crim.Objective.DEATH"
    "秘密窃取": "Crim.Objective.SECRET_STEALING"
    "暴力胁迫": "Crim.Objective.FORCE_INTIMIDATION"
    "数额巨大": "Crim.Objective.LARGE_AMOUNT"
    "数额特别巨大": "Crim.Objective.EXCEPTIONALLY_LARGE"
    "利用职务便利": "Crim.Objective.ABUSE_OF_OFFICE"
    "贩卖毒品": "Crim.Objective.DRUG_TRAFFICKING"
    "容留卖淫": "Crim.Objective.HARBORING_PROSTITUTION"
    # 主观要件 (Mens Rea)
    "直接故意": "Crim.Subjective.DIRECT_INTENT"
    "间接故意": "Crim.Subjective.INDIRECT_INTENT"
    "过于自信过失": "Crim.Subjective.CONSCIOUS_NEGLIGENCE"
    "疏忽大意过失": "Crim.Subjective.CARELESS_NEGLIGENCE"
    "共同故意": "Crim.Subjective.JOINT_INTENT"
    # 违法阻却
    "正当防卫": "Crim.Justification.SELF_DEFENSE"
    "防卫过当": "Crim.Justification.EXCESSIVE_DEFENSE"
    "紧急避险": "Crim.Justification.NECESSITY"
    # 量刑情节
    "自首": "Crim.Mitigation.SURRENDER"
    "立功": "Crim.Mitigation.MERITORIOUS"
    "认罪认罚": "Crim.Mitigation.GUILTY_PLEA"
    "退赃退赔": "Crim.Mitigation.RESTITUTION"
    "累犯": "Crim.Aggravation.RECIDIVISM"
    "主犯": "Crim.Role.PRINCIPAL"
    "从犯": "Crim.Role.ACCESSORY"
    "胁从犯": "Crim.Role.COERCED"
    # 程序
    "非法证据排除": "Crim.Exclusion.ILLEGAL_EVIDENCE"
    "刑讯逼供": "Crim.Exclusion.TORTURE"
    "程序违法": "Crim.Exclusion.PROCEDURAL_VIOLATION"

  concepts:
    - "犯罪构成要件"
    - "自首认定"
    - "立功认定"
    - "共同犯罪区分"
    - "正当防卫界限"
    - "非法证据排除"
    - "认罪认罚从宽"
    - "数罪并罚规则"
    - "缓刑适用条件"
    - "死刑适用限制"
    - "毒品数量认定"
    - "累犯认定标准"

