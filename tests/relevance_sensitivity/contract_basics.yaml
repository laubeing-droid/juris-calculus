name: contract_basics
rules:
  - id: R_PAYMENT_DUE
    premise_atoms: [Contract_Exists, Due_Date_Passed, Payment_Missing]
    head_claim: Breach_Established
    head_type: HORN
    source_anchor: civil_code_577
  - id: R_PAID
    premise_atoms: [Payment_Completed]
    head_claim: No_Breach_For_Nonpayment
    head_type: HORN
    source_anchor: civil_code_577_exception
base_facts:
  - Contract_Exists
  - Due_Date_Passed
  - Payment_Missing
cases:
  - id: irrelevant_party_name
    kind: SHOULD_NOT_CHANGE
    facts: [Contract_Exists, Due_Date_Passed, Payment_Missing, Party_Name_Changed]
    expected:
      same_claims_as_base: true
  - id: material_payment_completed
    kind: SHOULD_CHANGE
    facts: [Contract_Exists, Due_Date_Passed, Payment_Completed]
    expected:
      must_remove: [Breach_Established]
      must_include: [No_Breach_For_Nonpayment]
  - id: statute_confusion_noise
    kind: STATUTE_CONFUSION
    facts: [Contract_Exists, Due_Date_Passed, Payment_Missing, Similar_But_Inapplicable_Statute]
    expected:
      same_claims_as_base: true
