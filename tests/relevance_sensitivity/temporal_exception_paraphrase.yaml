name: temporal_exception_paraphrase
rules:
  - id: R_LIMITATION
    premise_atoms: [Claim_Filed, Limitation_Expired]
    head_claim: Claim_Time_Barred
    head_type: HORN
    source_anchor: civil_code_limitation#001
  - id: R_NO_LIMITATION
    premise_atoms: [Claim_Filed, Limitation_Not_Expired]
    head_claim: Claim_May_Proceed
    head_type: HORN
    source_anchor: civil_code_limitation#002
  - id: R_VALID_CONTRACT
    premise_atoms: [Contract_Exists, Consent_Valid]
    head_claim: Contract_Validity
    head_type: HORN
    source_anchor: civil_code_contract#001
  - id: R_DEFENSE
    premise_atoms: [Force_Majeure]
    head_claim: Defense_Available
    head_type: HORN
    attacks: [Contract_Validity]
    source_anchor: civil_code_force_majeure#001
base_facts:
  - Claim_Filed
  - Limitation_Not_Expired
cases:
  - id: temporal_expired
    kind: TEMPORAL_SPLIT
    facts: [Claim_Filed, Limitation_Expired]
    expected:
      must_remove: [Claim_May_Proceed]
      must_include: [Claim_Time_Barred]
  - id: paraphrase_same_atom
    kind: PARAPHRASE_INVARIANCE
    facts: [Claim_Filed, Limitation_Not_Expired, Same_Facts_Rephrased]
    expected:
      same_claims_as_base: true
  - id: exception_added
    kind: EXCEPTION_SENSITIVITY
    facts: [Contract_Exists, Consent_Valid, Force_Majeure]
    expected:
      must_include: [Contract_Validity, Defense_Available]
